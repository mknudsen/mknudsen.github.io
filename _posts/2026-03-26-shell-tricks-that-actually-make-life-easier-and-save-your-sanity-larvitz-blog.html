 <figure> <blockquote> <p>We’ve all been there. We&nbsp;learn <code>ls</code>, <code>cd</code>,&nbsp;and <code>grep</code>, and then we sort of… stop. The terminal becomes a place we live in-but we rarely bother to arrange the furniture. We accept that certain tasks take forty keystrokes, completely unaware that the shell authors solved our exact frustration sometime in&nbsp;1989.</p>
