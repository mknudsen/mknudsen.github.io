 <figure> <blockquote> <h4><strong>vanished</strong><div><div><div></div><button><svg><path></path><path></path></svg></button></div></div></h4><p>It’s possible that artificial intelligence is something unique in human history, but the mass automation it seems bound to produce definitely isn’t.</p><p><span>Despite this, we rarely hear in any detail about previous waves of automation. There’s discussion of the Industrial Revolution, but that’s about it. We hear more about Engels’ Pause than we do about </span><a href="https://en.wikipedia.org/wiki/Locomotive_Acts">flagmen</a><span> or telephone operators or motion picture projectionists.</span></p><p>This seems strange, because there has been a huge wave of automation within living memory. In fact, we are still living through it.</p> </blockquote> <figcaption> <cite>rowlandmanthorpe.substack.com</cite>, in "<cite><a href="https://rowlandmanthorpe.substack.com/p/the-case-of-the-disappearing-secretary">The case of the disappearing secretary</a></cite>" </figcaption> </figure>
