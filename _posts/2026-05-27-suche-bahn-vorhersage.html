 <figure> <blockquote> <p>Bahn-Vorhersage ist ein Rankingsystem für Zugverbindungen. Es ermittelt für alle Zugverbindungen innerhalb Deutschlands einen sogenannten Verbindungsscore. Dieser gibt an, wie sicher die Anschlüsse einer Zugverbindung sind. Ein hoher Score bedeutet, dass voraussichtlich alle Anschlusszüge erreicht werden, ein niedriger Score bedeutet, dass möglicherweise nicht alle Anschlusszüge erreicht werden können. </p><p> Ein hoher Verbindungsscore ist jedoch keine Garantie dafür, dass eine Verbindung funktioniert!</p> </blockquote> <figcaption> <cite>bahnvorhersage.de</cite>, in "<cite><a href="https://bahnvorhersage.de/">Suche | Bahn-Vorhersage</a></cite>" </figcaption> </figure>
