 <figure> <blockquote> <p>Despite widespread industry recommendations, a <a href="https://www.google.com/url?sa=E&amp;q=https%3A%2F%2Farxiv.org%2Fpdf%2F2602.11988">new ETH Zurich paper</a> concludes that <code>AGENTS.md</code> files may often hinder AI coding agents. The researchers recommend omitting LLM-generated context files entirely and limiting human-written instructions to non-inferable details, such as highly specific tooling or custom build commands.</p>

<p>The team (<a href="https://arxiv.org/search/cs?searchtype=author&amp;query=Gloaguen,+T">Thibaud Gloaguen</a>, <a href="https://arxiv.org/search/cs?searchtype=author&amp;query=M%C3%BCndler,+N">Niels Mündler</a>, <a href="https://arxiv.org/search/cs?searchtype=author&amp;query=M%C3%BCller,+M">Mark Müller</a>, <a href="https://arxiv.org/search/cs?searchtype=author&amp;query=Raychev,+V">Veselin Raychev</a>, <a href="https://arxiv.org/search/cs?searchtype=author&amp;query=Vechev,+M">Martin Vechev</a>) justified the research by noting that while 60,000 open-source repositories currently contain context files such as <code>AGENTS.md</code>, and many agent frameworks feature built-in commands to auto-generate them, there has been no rigorous empirical investigation into whether these files actually improve an AI agent’s ability to resolve real-world coding tasks.</p> </blockquote> <figcaption> <cite>www.infoq.com</cite>, in "<cite><a href="https://www.infoq.com/news/2026/03/agents-context-file-value-review/">New Research Reassesses the Value of AGENTS.md Files for AI Coding - InfoQ</a></cite>" </figcaption> </figure>
