 <figure> <blockquote> <p>Pagefind is a fully static search library that aims to perform well on large sites, while using as little of your users’ bandwidth as possible, and without hosting any infrastructure.</p><p>Pagefind works with any static HTML output. All static site generators and website frameworks are supported, as long as the built HTML contains the content of the website.</p><p>After indexing, Pagefind adds a static search bundle to your built files, which exposes a JavaScript search API that can be used anywhere on your site. Pagefind also provides prebuilt UI components that can be used with no configuration.</p><p>The goal of Pagefind is that websites with tens of thousands of pages should be searchable by someone in their browser, while consuming as little bandwidth as possible. Pagefind’s search index is split into chunks, so that searching in the browser only ever needs to load a small subset of the search index. Pagefind can run a full-text search on a 10,000 page site with a total network payload under 300kB, including the Pagefind library itself. For most sites, this will be closer to 100kB.</p> </blockquote> <figcaption> <cite>pagefind.app</cite>, in "<cite><a href="https://pagefind.app/">Pagefind</a></cite>" </figcaption> </figure>
