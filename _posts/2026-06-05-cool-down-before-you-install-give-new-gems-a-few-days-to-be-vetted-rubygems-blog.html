 <figure> <blockquote> Most supply-chain attacks against RubyGems exploit a narrow window: an account is compromised, a malicious version ships, and any <code>bundle install</code> in the minutes that follow resolves straight to it. <strong>Bundler 4.0.13</strong> introduces <strong>cooldown</strong>, a time-based filter that refuses to resolve to a version until it has been public for at least <em>N</em> days. Releases too new to have been scrutinized are passed over in favor of ones that have aged past the window. </blockquote> <figcaption> <cite>blog.rubygems.org</cite>, in "<cite><a href="https://blog.rubygems.org/2026/06/03/cooldown-let-new-gems-be-vetted.html">Cool down before you install: give new gems a few days to be vetted - RubyGems Blog</a></cite>" </figcaption> </figure>
