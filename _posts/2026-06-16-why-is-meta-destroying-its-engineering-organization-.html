 <figure> <blockquote> <p>For two decades, Meta had a unique, high-performance engineering org; right up until around April of this year. For the first 20 years of the company’s existence, it had a “move-fast-and-break-things” culture, and in the early 2020s this shifted to a “move-fast-with-stable-infra” one. Engineers I know at the company were empowered to do good work, focus on impact, and to balance business interests with solid engineering.</p><p>But in the past few weeks, all that has changed, as if the leadership has been following detailed blueprints on how to demolish a proven, successful engineering culture in the most ruthlessly efficient way possible.</p> </blockquote> <figcaption> <cite>newsletter.pragmaticengineer.com</cite>, in "<cite><a href="https://newsletter.pragmaticengineer.com/p/why-is-meta-destroying-its-engineering">Why is Meta destroying its engineering organization?</a></cite>" </figcaption> </figure>
